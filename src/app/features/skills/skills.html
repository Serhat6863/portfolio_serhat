<section class="skills" aria-labelledby="skills-heading">
  <div class="container">

    <!-- Header -->
    <header class="skills__header">
      <span class="section-tag" aria-hidden="true">Stack</span>
      <h2 id="skills-heading" class="section-title">
        Mes <span class="section-title-accent">Compétences</span>
      </h2>
      <p class="section-subtitle">
        Les technologies que j'utilise au quotidien
      </p>
    </header>

    <!-- Categories -->
    <div class="skills__categories">
      @for (item of categoriesWithOffset; track item.category.name) {
        <div class="skills__group">
          <h3 class="group__title">{{ item.category.name }}</h3>
          <ul class="group__cards" role="list">
            @for (skill of item.category.skills; track skill.name; let i = $index) {
              <li
                class="skill-card"
                [style.--i]="item.offset + i"
              >
                <span class="skill-card__icon" aria-hidden="true">{{ skill.icon }}</span>
                <span class="skill-card__name">{{ skill.name }}</span>
              </li>
            }
          </ul>
        </div>
      }
    </div>

  </div>
</section>
